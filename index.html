<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Manhattan Gallery Tracker</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    #legend {
      position: absolute; bottom: 30px; left: 12px;
      background: rgba(255,255,255,0.92); padding: 10px 14px;
      border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      font-size: 13px; line-height: 1.8; z-index: 1;
    }
    #legend h4 { margin: 0 0 6px; font-size: 13px; font-weight: 600; }
    .legend-dot { display: inline-block; width: 12px; height: 12px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .mapboxgl-popup-content { padding: 10px 14px; font-size: 13px; max-width: 220px; }
    .mapboxgl-popup-content strong { display: block; margin-bottom: 4px; }
    .mapboxgl-popup-content .addr { color: #555; margin-bottom: 4px; font-size: 12px; }
    .mapboxgl-popup-content a { color: #1565c0; text-decoration: none; }
    .updated-badge { display: inline-block; background: #f57c00; color: white;
      font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-bottom: 6px; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <h4>Manhattan Galleries</h4>
  <div><span class="legend-dot" style="background:#f57c00"></span>Updated today</div>
  <div><span class="legend-dot" style="background:#9e9e9e"></span>No change</div>
</div>
<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoiamYxMTU3OSIsImEiOiJjbGdkdXkxbjgyZjN0M2xvN2lzZHBxMnF5In0.-MJnfMqsExHCNvSXbA9VXw';
  const STADIA_KEY = '3b014278-2ba3-4a9e-9f27-d627fde87907';
  const map = new mapboxgl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'watercolor': {
          type: 'raster',
          tiles: [`https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg?api_key=${STADIA_KEY}`],
          tileSize: 256,
          attribution: '&copy; <a href="https://stadiamaps.com">Stadia Maps</a> &copy; <a href="https://stamen.com">Stamen Design</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        },
        'toner-labels': {
          type: 'raster',
          tiles: [`https://tiles.stadiamaps.com/tiles/stamen_toner_labels/{z}/{x}/{y}.png?api_key=${STADIA_KEY}`],
          tileSize: 256
        }
      },
      layers: [
        { id: 'watercolor-layer', type: 'raster', source: 'watercolor' },
        { id: 'labels-layer', type: 'raster', source: 'toner-labels' }
      ]
    },
    center: [-73.998, 40.722], zoom: 13
  });
  map.addControl(new mapboxgl.NavigationControl(), 'top-right');
  map.on('load', () => {
    map.addSource('galleries', {
      type: 'geojson',
      data: 'data/galleries.json?v=' + Date.now()
    });
    map.addLayer({
      id: 'galleries-layer', type: 'circle', source: 'galleries',
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 4, 14, 8, 17, 12],
        'circle-color': ['case', ['==', ['get', 'updated'], true], '#f57c00', '#9e9e9e'],
        'circle-stroke-width': 1.5,
        'circle-stroke-color': ['case', ['==', ['get', 'updated'], true], '#e65100', '#757575'],
        'circle-opacity': 0.9
      }
    });
    map.on('mouseenter', 'galleries-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'galleries-layer', () => { map.getCanvas().style.cursor = ''; });
    map.on('click', 'galleries-layer', (e) => {
      const props = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      const badge = props.updated ? '<span class="updated-badge">Updated today</span><br>' : '';
      const addr = props.address ? '<div class="addr">' + props.address + '</div>' : '';
      const site = props.url ? '<a href="' + props.url + '" target="_blank">Visit website</a>' : '';
      new mapboxgl.Popup({offset: 10})
        .setLngLat(coords)
        .setHTML(badge + '<strong>' + props.name + '</strong>' + addr + site)
        .addTo(map);
    });
  });
</script>
</body>
</html>
