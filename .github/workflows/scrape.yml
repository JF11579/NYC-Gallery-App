name: Daily Gallery Scrape
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python scraper.py
      - name: Commit data
        run: |
          git config --global user.name "GalleryBot"
          git config --global user.email "bot@github.com"
          git add data/galleries.json data/hashes.json
          git commit -m "Update gallery data" || exit 0
          git push
